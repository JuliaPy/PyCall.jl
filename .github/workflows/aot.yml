name: AOT test

on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:
  workflow_dispatch:

jobs:
  test-aot:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        architecture: [x64]
        python-version: ['3.x']
        julia-version:
          - '1'
          - '1.6'
          # - 'nightly'  # TODO: reenable
      fail-fast: false
    env:
      PYTHON: python${{ matrix.python-version }}
    name: Test AOT
      Julia ${{ matrix.julia-version }}
      Python ${{ matrix.python-version }}
      ${{ matrix.os }} ${{ matrix.architecture }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}
      - run: python --version
      - run: python -m pip install --user numpy
      - name: Setup julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.architecture }}
          show-versioninfo: true

      - name: Install PackageCompiler.jl
        run: using Pkg; Pkg.add("PackageCompiler", version="1")
        shell: julia --color=yes {0}

      - run: aot/compile.jl
      - run: aot/assert_has_pycall.jl
      - run: aot/runtests.sh
